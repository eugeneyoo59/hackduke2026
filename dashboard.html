<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PD Glove Monitor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0a0a0f; color: #e0e0e0;
  min-height: 100vh; padding: 24px;
}
header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 24px;
}
header h1 { font-size: 20px; font-weight: 500; color: #fff; }
.status { font-size: 13px; color: #888; display:flex; align-items:center; gap:6px; }
.dot { width:8px; height:8px; border-radius:50%; background:#555; transition:background 0.3s; }
.dot.on { background:#22c55e; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
#connect-btn {
  background: #2563eb; color: #fff; border: none;
  padding: 10px 20px; border-radius: 8px; font-size: 13px;
  cursor: pointer; transition: background 0.2s;
}
#connect-btn:hover { background: #1d4ed8; }
#connect-btn.connected { background: #16a34a; }
.banner {
  display: none; text-align: center; padding: 14px;
  border-radius: 10px; font-size: 15px; font-weight: 600;
  margin-bottom: 16px;
}
.banner.show { display: block; }
#pd-banner { background: #ef4444; color: #fff; animation: pulse 1s infinite; }
#fall-banner { background: #7c3aed; color: #fff; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }
.grid-top {
  display: grid; grid-template-columns: 1.4fr 1fr;
  gap: 16px; margin-bottom: 16px;
}
.grid-accel {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 16px; margin-bottom: 16px;
}
.card {
  background: #13131a; border: 1px solid #1e1e2e;
  border-radius: 12px; padding: 20px;
}
.card-label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 1px; color: #888; margin-bottom: 10px;
}
.big-value {
  font-size: 64px; font-weight: 700;
  line-height: 1; transition: color 0.3s;
}
.big-value.low  { color: #22c55e; }
.big-value.mid  { color: #f59e0b; }
.big-value.high { color: #ef4444; }
#risk-card { transition: border-color 0.3s; }
#risk-card.alert { border-color: #ef4444; background: #1a0a0a; }
#risk-label { font-size: 13px; color: #888; margin-top: 6px; }
#risk-bar-bg {
  height: 5px; background: #1e1e2e;
  border-radius: 3px; margin-top: 14px; overflow: hidden;
}
#risk-bar {
  height: 100%; width: 0%; border-radius: 3px;
  background: #22c55e; transition: width 0.4s, background 0.3s;
}
.accel-val {
  font-size: 26px; font-weight: 600;
  font-variant-numeric: tabular-nums; color: #fff;
}
.accel-unit { font-size: 13px; color: #888; margin-top: 4px; }
.fsr-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.fsr-row:last-child { margin-bottom: 0; }
.fsr-name { font-size: 12px; color: #888; width: 44px; flex-shrink:0; }
.fsr-bg { flex: 1; height: 8px; background: #2a2a3a; border-radius: 4px; overflow: hidden; }
.fsr-fill { height: 100%; width: 0%; background: #2563eb; border-radius: 4px; transition: width 0.15s; }
.fsr-num { font-size: 12px; color: #888; width: 36px; text-align:right; }
#log {
  font-family: "SF Mono", monospace; font-size: 12px;
  height: 140px; overflow-y: auto; padding: 10px;
  background: #0d0d12; border-radius: 8px; border: 1px solid #2a2a3a;
}
.log-entry { margin-bottom: 3px; color: #777; }
.log-entry.pd   { color: #ef4444; }
.log-entry.fall { color: #a78bfa; }
.log-entry.ok   { color: #22c55e; }
#model-status {
  font-size: 12px; color: #888; margin-bottom: 16px;
  padding: 10px; background: #0d0d12;
  border-radius: 8px; border: 1px solid #2a2a3a;
}
</style>
</head>
<body>

<header>
  <div>
    <h1>PD Glove Monitor</h1>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">Disconnected</span>
    </div>
  </div>
  <button id="connect-btn" onclick="toggleConnect()">Connect to Glove</button>
</header>

<div id="model-status">Model: loading model_weights.json...</div>

<div id="pd-banner"   class="banner">PARKINSON'S RISK DETECTED</div>
<div id="fall-banner" class="banner">FALL DETECTED</div>

<div class="grid-top">
  <div class="card" id="risk-card">
    <div class="card-label">Parkinson's Risk Score</div>
    <div class="big-value low" id="risk-val">--</div>
    <div id="risk-label">waiting for data</div>
    <div id="risk-bar-bg"><div id="risk-bar"></div></div>
  </div>
  <div class="card">
    <div class="card-label">Fingertip Pressure</div>
    <div class="fsr-row"><div class="fsr-name">Thumb</div><div class="fsr-bg"><div class="fsr-fill" id="f0"></div></div><div class="fsr-num" id="f0n">0</div></div>
    <div class="fsr-row"><div class="fsr-name">Index</div><div class="fsr-bg"><div class="fsr-fill" id="f1"></div></div><div class="fsr-num" id="f1n">0</div></div>
    <div class="fsr-row"><div class="fsr-name">Middle</div><div class="fsr-bg"><div class="fsr-fill" id="f2"></div></div><div class="fsr-num" id="f2n">0</div></div>
    <div class="fsr-row"><div class="fsr-name">Ring</div><div class="fsr-bg"><div class="fsr-fill" id="f3"></div></div><div class="fsr-num" id="f3n">0</div></div>
    <div class="fsr-row"><div class="fsr-name">Pinky</div><div class="fsr-bg"><div class="fsr-fill" id="f4"></div></div><div class="fsr-num" id="f4n">0</div></div>
  </div>
</div>

<div class="grid-accel">
  <div class="card"><div class="card-label">Accel X</div><div class="accel-val" id="ax">--</div><div class="accel-unit">m/s²</div></div>
  <div class="card"><div class="card-label">Accel Y</div><div class="accel-val" id="ay">--</div><div class="accel-unit">m/s²</div></div>
  <div class="card"><div class="card-label">Accel Z</div><div class="accel-val" id="az">--</div><div class="accel-unit">m/s²</div></div>
</div>

<div class="card">
  <div class="card-label" style="margin-bottom:8px">Event Log</div>
  <div id="log"></div>
</div>

<script>
const SERVICE_UUID        = "12345678-1234-1234-1234-123456789abc";
const CHARACTERISTIC_UUID = "abcd1234-ab12-ab12-ab12-abcdef123456";
const VOTE_WINDOW = 10;
const ALERT_COUNT = 6;

let tmodel = null;
let ringBuffer = [];
let gravity = [0, 0, 0];
let voteBuffer = new Array(VOTE_WINDOW).fill(0);
let voteIdx = 0;
let device = null;
let fallTimeout = null;

async function loadModel() {
  try {
    const resp = await fetch('tremor_model.json');
    tmodel = await resp.json();
    document.getElementById('model-status').textContent =
      `Model loaded — GBT ${tmodel.n_estimators} trees, ${tmodel.feature_names.length} features`;
    document.getElementById('model-status').style.color = '#22c55e';
    addLog('Tremor model loaded.', 'ok');
  } catch(e) {
    document.getElementById('model-status').textContent =
      'ERROR: Could not load tremor_model.json — place it in the same folder as this file.';
    document.getElementById('model-status').style.color = '#ef4444';
  }
}

function removeGravity(raw) {
  const alpha = 0.98;
  gravity[0] = alpha * gravity[0] + (1 - alpha) * raw[0];
  gravity[1] = alpha * gravity[1] + (1 - alpha) * raw[1];
  gravity[2] = alpha * gravity[2] + (1 - alpha) * raw[2];
  return [raw[0] - gravity[0], raw[1] - gravity[1], raw[2] - gravity[2]];
}

function fft(re, im) {
  const n = re.length;
  if (n <= 1) return;
  const half = n >> 1;
  const reE = new Float32Array(half), imE = new Float32Array(half);
  const reO = new Float32Array(half), imO = new Float32Array(half);
  for (let i = 0; i < half; i++) {
    reE[i] = re[i*2]; imE[i] = im[i*2];
    reO[i] = re[i*2+1]; imO[i] = im[i*2+1];
  }
  fft(reE, imE); fft(reO, imO);
  for (let k = 0; k < half; k++) {
    const angle = -2 * Math.PI * k / n;
    const cos = Math.cos(angle), sin = Math.sin(angle);
    const tr = cos * reO[k] - sin * imO[k];
    const ti = sin * reO[k] + cos * imO[k];
    re[k]        = reE[k] + tr; im[k]        = imE[k] + ti;
    re[k + half] = reE[k] - tr; im[k + half] = imE[k] - ti;
  }
}

function rfft_mag_sq(x, fs) {
  let n = 1;
  while (n < x.length) n <<= 1;
  const re = new Float32Array(n);
  const im = new Float32Array(n);
  for (let i = 0; i < x.length; i++)
    re[i] = x[i] * (0.5 - 0.5 * Math.cos(2 * Math.PI * i / (x.length - 1)));
  fft(re, im);
  const half = Math.floor(n / 2) + 1;
  const mag  = new Float32Array(half);
  for (let i = 0; i < half; i++) mag[i] = re[i]*re[i] + im[i]*im[i];
  return { mag, freqRes: fs / n };
}

function extractFeatures(window) {
  const T    = window.length;
  const fs   = tmodel.sample_rate;
  const tlo  = tmodel.tremor_lo;
  const thi  = tmodel.tremor_hi;
  const lolo = 0.5, lohi = tlo;
  const hilo = thi, hihi = 15.0;
  const eps  = 1e-10;
  const features = [];
  const tremorEnergies = [];

  for (let axis = 0; axis < 3; axis++) {
    const x = new Float32Array(T);
    for (let i = 0; i < T; i++) x[i] = window[i][axis];
    const { mag, freqRes } = rfft_mag_sq(x, fs);
    let tremE = 0, lowE = 0, highE = 0, totalE = 0;
    let maxPow = 0, domFreq = 0;
    for (let i = 0; i < mag.length; i++) {
      const f = i * freqRes;
      if (f >= lolo && f <= hihi) {
        totalE += mag[i];
        if (f >= tlo  && f <= thi)  tremE += mag[i];
        if (f >= lolo && f <  lohi) lowE  += mag[i];
        if (f >= hilo && f <= hihi) highE += mag[i];
        if (mag[i] > maxPow) { maxPow = mag[i]; domFreq = f; }
      }
    }
    features.push(tremE, lowE, highE, tremE / (totalE + eps), domFreq);
    tremorEnergies.push(tremE);
  }

  features.push(tremorEnergies.reduce((a,b) => a+b, 0) / 3);

  const mag_sig = new Float32Array(T);
  for (let i = 0; i < T; i++) {
    const ax = window[i][0], ay = window[i][1], az = window[i][2];
    mag_sig[i] = Math.sqrt(ax*ax + ay*ay + az*az);
  }
  const { mag: mfft, freqRes: mfr } = rfft_mag_sq(mag_sig, fs);
  let mTotal = 0;
  const valid = [];
  for (let i = 0; i < mfft.length; i++) {
    const f = i * mfr;
    if (f >= lolo && f <= hihi) { valid.push(mfft[i] + eps); mTotal += mfft[i] + eps; }
  }
  let entropy = 0;
  for (const v of valid) { const p = v / mTotal; entropy -= p * Math.log(p); }
  features.push(entropy);

  return features;
}

function predictTree(tree, features) {
  let node = 0;
  while (tree.children_left[node] !== -1) {
    node = features[tree.feature[node]] <= tree.threshold[node]
      ? tree.children_left[node]
      : tree.children_right[node];
  }
  return tree.value[node];
}

function runInference(window) {
  if (!tmodel) return 0;
  const features = extractFeatures(window);
  const scaled = features.map((f, i) =>
    (f - tmodel.scaler_mean[i]) / (tmodel.scaler_std[i] + 1e-10)
  );
  let score = Math.log(tmodel.init_score / (1 - tmodel.init_score + 1e-10));
  for (const tree of tmodel.trees)
    score += tmodel.learning_rate * predictTree(tree, scaled);
  return 1 / (1 + Math.exp(-score));
}

function majorityVote(isPD) {
  voteBuffer[voteIdx] = isPD ? 1 : 0;
  voteIdx = (voteIdx + 1) % VOTE_WINDOW;
  return voteBuffer.reduce((a,b) => a+b, 0) >= ALERT_COUNT;
}

async function toggleConnect() {
  if (device && device.gatt.connected) { device.gatt.disconnect(); return; }
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'PD-Glove' }],
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', onDisconnected);
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const char    = await service.getCharacteristic(CHARACTERISTIC_UUID);
    await char.startNotifications();
    char.addEventListener('characteristicvaluechanged', onData);
    onConnected();
  } catch(e) { addLog('Connection failed: ' + e.message, ''); }
}

function onConnected() {
  document.getElementById('connect-btn').textContent = 'Disconnect';
  document.getElementById('connect-btn').classList.add('connected');
  document.getElementById('dot').classList.add('on');
  document.getElementById('status-text').textContent = 'Connected to PD-Glove';
  addLog('Connected.', 'ok');
}

function onDisconnected() {
  document.getElementById('connect-btn').textContent = 'Connect to Glove';
  document.getElementById('connect-btn').classList.remove('connected');
  document.getElementById('dot').classList.remove('on');
  document.getElementById('status-text').textContent = 'Disconnected';
  addLog('Disconnected.', '');
}

function onData(event) {
  const raw = new TextDecoder().decode(event.target.value);
  let d;
  try { d = JSON.parse(raw); } catch(e) { return; }

  document.getElementById('ax').textContent = d.ax.toFixed(2);
  document.getElementById('ay').textContent = d.ay.toFixed(2);
  document.getElementById('az').textContent = d.az.toFixed(2);

  for (let i = 0; i < 5; i++) {
    const pct = Math.round((d.fsr[i] / 4095) * 100);
    document.getElementById('f'+i).style.width = pct + '%';
    document.getElementById('f'+i+'n').textContent = d.fsr[i];
  }

  if (d.fall) {
    document.getElementById('fall-banner').classList.add('show');
    addLog('FALL DETECTED', 'fall');
    if (fallTimeout) clearTimeout(fallTimeout);
    fallTimeout = setTimeout(() =>
      document.getElementById('fall-banner').classList.remove('show'), 4000);
  }

  const linear = removeGravity([d.ax, d.ay, d.az]);
  ringBuffer.push(linear);
  const ws = tmodel ? tmodel.window_size : 400;
  if (ringBuffer.length > ws) ringBuffer.shift();

  if (ringBuffer.length === ws) {
    const prob  = runInference(ringBuffer);
    const risk  = prob * 100;
    const thresh = tmodel ? tmodel.threshold : 0.4;
    const alert = majorityVote(prob > thresh);

    const rv = document.getElementById('risk-val');
    const rb = document.getElementById('risk-bar');
    const rc = document.getElementById('risk-card');
    const rl = document.getElementById('risk-label');

    rv.textContent = risk.toFixed(1) + '%';
    rb.style.width  = risk + '%';

    if (risk < 40) {
      rv.className = 'big-value low'; rb.style.background = '#22c55e';
      rl.textContent = 'Low risk'; rc.classList.remove('alert');
    } else if (risk < 65) {
      rv.className = 'big-value mid'; rb.style.background = '#f59e0b';
      rl.textContent = 'Moderate risk'; rc.classList.remove('alert');
    } else {
      rv.className = 'big-value high'; rb.style.background = '#ef4444';
      rl.textContent = 'High risk';
    }

    if (alert) {
      document.getElementById('pd-banner').classList.add('show');
      rc.classList.add('alert');
      addLog("PARKINSON'S DETECTED — " + risk.toFixed(1) + '%', 'pd');
    } else {
      document.getElementById('pd-banner').classList.remove('show');
    }
  }
}

function addLog(msg, type) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-entry ' + type;
  div.textContent = new Date().toLocaleTimeString() + '  ' + msg;
  el.prepend(div);
  while (el.children.length > 60) el.removeChild(el.lastChild);
}

loadModel();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PD Glove Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.5px;
  }

  header span {
    font-size: 13px;
    color: #666;
  }

  #connect-btn {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #connect-btn:hover { background: #1d4ed8; }
  #connect-btn.connected { background: #16a34a; }
  #connect-btn.connected:hover { background: #15803d; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .card {
    background: #13131a;
    border: 1px solid #1e1e2e;
    border-radius: 12px;
    padding: 20px;
  }

  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    margin-bottom: 12px;
  }

  .card-value {
    font-size: 36px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
  }

  .card-unit {
    font-size: 14px;
    color: #555;
    margin-top: 4px;
  }

  /* Risk score card */
  #risk-card {
    background: #13131a;
    border: 1px solid #1e1e2e;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    transition: border-color 0.3s;
  }
  #risk-card.alert {
    border-color: #ef4444;
    background: #1a0a0a;
  }

  #risk-value {
    font-size: 72px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    transition: color 0.3s;
  }
  #risk-value.low  { color: #22c55e; }
  #risk-value.mid  { color: #f59e0b; }
  #risk-value.high { color: #ef4444; }

  #risk-label {
    font-size: 13px;
    color: #555;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #risk-bar-bg {
    height: 6px;
    background: #1e1e2e;
    border-radius: 3px;
    margin-top: 16px;
    overflow: hidden;
  }
  #risk-bar {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: #22c55e;
    transition: width 0.4s, background 0.3s;
  }

  #alert-banner {
    display: none;
    background: #ef4444;
    color: #fff;
    text-align: center;
    padding: 14px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    animation: pulse 1s infinite;
  }
  #alert-banner.show { display: block; }

  #fall-banner {
    display: none;
    background: #7c3aed;
    color: #fff;
    text-align: center;
    padding: 14px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  #fall-banner.show { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Accel cards */
  .accel-value {
    font-size: 28px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* FSR bars */
  #fsr-card { grid-column: span 1; }

  .fsr-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .fsr-row:last-child { margin-bottom: 0; }

  .fsr-finger {
    font-size: 11px;
    color: #555;
    width: 44px;
    flex-shrink: 0;
  }

  .fsr-bar-bg {
    flex: 1;
    height: 8px;
    background: #1e1e2e;
    border-radius: 4px;
    overflow: hidden;
  }

  .fsr-bar {
    height: 100%;
    width: 0%;
    background: #2563eb;
    border-radius: 4px;
    transition: width 0.2s;
  }

  .fsr-num {
    font-size: 11px;
    color: #555;
    width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* History log */
  #log {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
    color: #444;
    height: 160px;
    overflow-y: auto;
    padding: 12px;
    background: #0d0d12;
    border-radius: 8px;
    border: 1px solid #1a1a2a;
  }
  #log .entry { margin-bottom: 4px; color: #555; }
  #log .entry.pd { color: #ef4444; }
  #log .entry.fall { color: #7c3aed; }
  #log .entry.normal { color: #22c55e; }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    margin-right: 8px;
    transition: background 0.3s;
  }
  .status-dot.on { background: #22c55e; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<header>
  <div>
    <h1>PD Glove Monitor</h1>
    <span><span class="status-dot" id="status-dot"></span><span id="status-text">Disconnected</span></span>
  </div>
  <button id="connect-btn" onclick="toggleConnect()">Connect to Glove</button>
</header>

<!-- Alert banners -->
<div id="alert-banner">⚠ PARKINSON'S DETECTED</div>
<div id="fall-banner">🔴 FALL DETECTED</div>

<!-- Risk score + FSR -->
<div class="grid-2">

  <div id="risk-card" class="card">
    <div class="card-label">Parkinson's Risk Score</div>
    <div id="risk-value" class="low">--</div>
    <div id="risk-label">waiting for data</div>
    <div id="risk-bar-bg"><div id="risk-bar"></div></div>
  </div>

  <div id="fsr-card" class="card">
    <div class="card-label">Fingertip Pressure</div>
    <div class="fsr-row">
      <div class="fsr-finger">Thumb</div>
      <div class="fsr-bar-bg"><div class="fsr-bar" id="fsr0"></div></div>
      <div class="fsr-num" id="fsr0-num">0</div>
    </div>
    <div class="fsr-row">
      <div class="fsr-finger">Index</div>
      <div class="fsr-bar-bg"><div class="fsr-bar" id="fsr1"></div></div>
      <div class="fsr-num" id="fsr1-num">0</div>
    </div>
    <div class="fsr-row">
      <div class="fsr-finger">Middle</div>
      <div class="fsr-bar-bg"><div class="fsr-bar" id="fsr2"></div></div>
      <div class="fsr-num" id="fsr2-num">0</div>
    </div>
    <div class="fsr-row">
      <div class="fsr-finger">Ring</div>
      <div class="fsr-bar-bg"><div class="fsr-bar" id="fsr3"></div></div>
      <div class="fsr-num" id="fsr3-num">0</div>
    </div>
    <div class="fsr-row">
      <div class="fsr-finger">Pinky</div>
      <div class="fsr-bar-bg"><div class="fsr-bar" id="fsr4"></div></div>
      <div class="fsr-num" id="fsr4-num">0</div>
    </div>
  </div>

</div>

<!-- Accelerometer -->
<div class="grid">
  <div class="card">
    <div class="card-label">Accel X</div>
    <div class="accel-value" id="ax">--</div>
    <div class="card-unit">m/s²</div>
  </div>
  <div class="card">
    <div class="card-label">Accel Y</div>
    <div class="accel-value" id="ay">--</div>
    <div class="card-unit">m/s²</div>
  </div>
  <div class="card">
    <div class="card-label">Accel Z</div>
    <div class="accel-value" id="az">--</div>
    <div class="card-unit">m/s²</div>
  </div>
</div>

<!-- Log -->
<div class="card">
  <div class="card-label" style="margin-bottom:10px">Event Log</div>
  <div id="log"></div>
</div>

<script>
  const SERVICE_UUID        = "12345678-1234-1234-1234-123456789abc";
  const CHARACTERISTIC_UUID = "abcd1234-ab12-ab12-ab12-abcdef123456";

  let device, characteristic;
  let fallTimeout = null;

  async function toggleConnect() {
    if (device && device.gatt.connected) {
      device.gatt.disconnect();
      onDisconnected();
      return;
    }

    try {
      device = await navigator.bluetooth.requestDevice({
        filters: [{ name: "PD-Glove" }],
        optionalServices: [SERVICE_UUID]
      });

      device.addEventListener("gattserverdisconnected", onDisconnected);

      const server  = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

      await characteristic.startNotifications();
      characteristic.addEventListener("characteristicvaluechanged", onData);

      onConnected();
    } catch (err) {
      log("Connection failed: " + err.message, "");
    }
  }

  function onConnected() {
    document.getElementById("connect-btn").textContent = "Disconnect";
    document.getElementById("connect-btn").classList.add("connected");
    document.getElementById("status-dot").classList.add("on");
    document.getElementById("status-text").textContent = "Connected to PD-Glove";
    log("Connected to PD-Glove", "normal");
  }

  function onDisconnected() {
    document.getElementById("connect-btn").textContent = "Connect to Glove";
    document.getElementById("connect-btn").classList.remove("connected");
    document.getElementById("status-dot").classList.remove("on");
    document.getElementById("status-text").textContent = "Disconnected";
    log("Disconnected", "");
  }

  function onData(event) {
    const decoder = new TextDecoder("utf-8");
    const raw     = decoder.decode(event.target.value);

    let data;
    try { data = JSON.parse(raw); }
    catch (e) { return; }

    // Accelerometer
    document.getElementById("ax").textContent = data.ax.toFixed(2);
    document.getElementById("ay").textContent = data.ay.toFixed(2);
    document.getElementById("az").textContent = data.az.toFixed(2);

    // FSR bars (max ADC value = 4095)
    for (let i = 0; i < 5; i++) {
      const pct = Math.round((data.fsr[i] / 4095) * 100);
      document.getElementById("fsr" + i).style.width = pct + "%";
      document.getElementById("fsr" + i + "-num").textContent = data.fsr[i];
    }

    // Risk score
    const risk = data.risk;
    const rv   = document.getElementById("risk-value");
    const rb   = document.getElementById("risk-bar");
    const rc   = document.getElementById("risk-card");
    const rl   = document.getElementById("risk-label");

    rv.textContent = risk.toFixed(1) + "%";
    rb.style.width = risk + "%";

    if (risk < 40) {
      rv.className = "low";
      rb.style.background = "#22c55e";
      rl.textContent = "Low risk";
      rc.classList.remove("alert");
    } else if (risk < 65) {
      rv.className = "mid";
      rb.style.background = "#f59e0b";
      rl.textContent = "Moderate risk";
      rc.classList.remove("alert");
    } else {
      rv.className = "high";
      rb.style.background = "#ef4444";
      rl.textContent = "High risk";
    }

    // PD alert
    const alertBanner = document.getElementById("alert-banner");
    if (data.pd) {
      alertBanner.classList.add("show");
      rc.classList.add("alert");
      log("PARKINSON'S DETECTED — risk " + risk.toFixed(1) + "%", "pd");
    } else {
      alertBanner.classList.remove("show");
    }

    // Fall alert
    const fallBanner = document.getElementById("fall-banner");
    if (data.fall) {
      fallBanner.classList.add("show");
      log("FALL DETECTED", "fall");
      if (fallTimeout) clearTimeout(fallTimeout);
      fallTimeout = setTimeout(() => fallBanner.classList.remove("show"), 4000);
    }
  }

  function log(msg, type) {
    const logEl = document.getElementById("log");
    const time  = new Date().toLocaleTimeString();
    const div   = document.createElement("div");
    div.className = "entry " + type;
    div.textContent = time + "  " + msg;
    logEl.prepend(div);
    // Keep last 50 entries
    while (logEl.children.length > 50) logEl.removeChild(logEl.lastChild);
  }
</script>
</body>
</html>
